name: TuxBack CI

on:
  push:
    branches:
      - main
      - master
      - dev
  pull_request:
    branches:
      - main
      - master
      - dev

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Make launcher executable
        run: chmod +x tuxback

      - name: Create test data
        run: |
          mkdir -p test_data
          echo "hello from github actions" > test_data/file.txt

      - name: Smoke test Python imports
        run: |
          python -c "from app.config import ensure_directories, setup_logging; ensure_directories(); setup_logging(); print('config ok')"
          python -c "from app.storage import list_backups; print('storage ok')"
          python -c "from app.backup import create_backup; print('backup ok')"
          python -c "from app.restore import restore_backup; print('restore ok')"
          python -c "from app.scheduler import add_schedule, list_schedules, run_due_schedules; print('scheduler ok')"

      - name: Run launcher help
        run: ./tuxback --help

      - name: Run launcher backup command
        run: ./tuxback backup test_data

      - name: Run launcher list command
        run: ./tuxback list

      - name: Run launcher schedule commands
        run: |
          ./tuxback schedule-add test_data 1
          ./tuxback schedule-list
          ./tuxback run-scheduler

      - name: Check log file creation
        run: test -f tuxback.log

      - name: Build Docker image
        run: docker build -t tuxback .

      - name: Run Docker container help
        run: docker run --rm tuxback